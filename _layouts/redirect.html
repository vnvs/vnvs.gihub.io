{% assign target = site.data.links | where: "key", page.link_key | first %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% if target %}
    <title>Redirecting to {{ target.label | escape }}</title>
    <link rel="canonical" href="{{ target.url | escape }}">
    <meta http-equiv="refresh" content="0; url={{ target.url | escape }}">
  {% else %}
    <title>Link not found</title>
  {% endif %}
</head>
<body>
  {% if target %}
    <p>Redirecting to <a href="{{ target.url | escape }}">{{ target.label | escape }}</a>.</p>
  {% else %}
    <p>Link not found.</p>
  {% endif %}
</body>
</html>
